<!doctype html>
<html>
<head>
    <title>Peer Tracker Dashboard</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
<div class="container">

    <h1 class="title">Peer Tracker Dashboard</h1>
    <p class="subtitle">Manage peer registration, status, and active list</p>

    <img src="images/welcome.png" alt="Welcome" class="hero-image">

    <hr>

    <h2 class="section-title">Register / Manage Peer</h2>
    <div class="input-row">
        <input id="ip" placeholder="Enter Peer IP">
        <input id="port" placeholder="Enter Peer Port">
    </div>

    <div class="button-row">
        <button class="btn primary" onclick="submitInfo()">Register</button>
        <button class="btn success" onclick="addList()">Go Online</button>
        <button class="btn danger" onclick="remove()">Go Offline</button>
    </div>

    <hr>

    <h2 class="section-title">Active Peer List</h2>
    <div class="button-row">
        <button class="btn secondary" onclick="getList()">Refresh Peer List</button>
        <button class="btn primary" onclick="chat()">Start Chatting</button>
    </div>
    <div id="peerTable" class="table-container"></div>
</div>

<div id="popup"></div>

<script>

function chat() {
    window.location.href = 'chat.html';
}
function showPopup(msg, isError = false) {
    const popup = document.getElementById('popup');
    popup.textContent = msg;
    popup.style.background = isError ? 'var(--danger-color)' : 'var(--success-color)';
    popup.style.display = 'block';
    setTimeout(() => popup.style.display = 'none', 2500);
}

async function submitInfo() {
    const ip = document.getElementById('ip').value;
    const port = document.getElementById('port').value;

    if (!ip || !port) {
        return showPopup('IP and Port are required.', true);
    }

    const res = await fetch('/submit-info', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ip, port })
    });
    const data = await res.json();
    if (data.error) return showPopup(data.error, true);
    showPopup(`${data.peer_id} registered successfully!`);
}

async function addList() {
    const ip = document.getElementById('ip').value;
    const port = document.getElementById('port').value;

    if (!ip || !port) {
        return showPopup('IP and Port are required to go online.', true);
    }

    const res = await fetch('/add-list', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ip, port })
    });
    const data = await res.json();
    if (data.error) return showPopup(data.error, true);
    showPopup(`${data.peer_id} is now online.`);
    getList(); // Refresh list after going online
}

async function remove() {
    const ip = document.getElementById('ip').value;
    const port = document.getElementById('port').value;

    if (!ip || !port) {
        return showPopup('IP and Port are required to go offline.', true);
    }

    const res = await fetch('/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ip, port })
    });
    const data = await res.json();
    if (data.error) return showPopup(data.error, true);
    showPopup(`${data.peer_id} is now offline.`);
    getList(); // Refresh list after going offline
}

async function getList() {
    const res = await fetch('/get-list');
    const data = await res.json();

    let html = `
        <table>
            <thead>
                <tr>
                    <th>IP Address</th>
                    <th>Port</th>
                </tr>
            </thead>
            <tbody>
    `;

    const peerList = data.peer_list || {};
    if (Object.keys(peerList).length === 0) {
        html += `<tr><td colspan="2">No active peers found.</td></tr>`;
    } else {
        for (const peerId in peerList) {
            const peer = peerList[peerId];
            html += `
                <tr>
                    <td>${peer.ip}</td>
                    <td>${peer.port}</td>
                </tr>
            `;
        }
    }

    html += '</tbody></table>';
    document.getElementById('peerTable').innerHTML = html;
}

// Initial load
document.addEventListener('DOMContentLoaded', getList);
</script>

</body>
</html>
