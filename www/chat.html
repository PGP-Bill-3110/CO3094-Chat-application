<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">P2P Chat</h1>
                <button id="connectBtn" class="connect-btn">
                    <span class="btn-text">Go Online</span>
                    <span class="status-dot"></span>
                </button>
            </div>
            
            <div class="user-list-label">Online Peers</div>
            <ul class="user-list" id="userList">
                <!-- Users will be populated by JS -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div id="chatView" style="display: none; height: 100%; flex-direction: column;">
                <header class="chat-header">
                    <div class="user-avatar" id="headerAvatar"></div>
                    <div class="chat-header-info">
                        <h2 id="headerName">User Name</h2>
                        <div class="chat-header-status" id="headerStatus">Online</div>
                    </div>
                </header>

                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will appear here -->
                </div>

                <div class="input-area">
                    <input type="text" id="messageInput" class="message-input" placeholder="Type a message...">
                    <button id="sendBtn" class="send-btn">
                        <svg viewBox="0 0 24 24">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="emptyState" class="empty-state">
                <div class="empty-state-icon">👋</div>
                <h3>Welcome to P2P Chat</h3>
                <p>Select a peer from the list to start a conversation.</p>
            </div>
        </main>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        const state = {
            users: [],
            messages: {},
            currentUserId: null,
            currentUserIP: null,
            isConnected: false,
        };

        // --- DOM ELEMENTS ---
        const dom = {
            userList: document.getElementById('userList'),
            chatView: document.getElementById('chatView'),
            emptyState: document.getElementById('emptyState'),
            headerName: document.getElementById('headerName'),
            headerStatus: document.getElementById('headerStatus'),
            headerAvatar: document.getElementById('headerAvatar'),
            messagesContainer: document.getElementById('messagesContainer'),
            messageInput: document.getElementById('messageInput'),
            sendBtn: document.getElementById('sendBtn'),
            connectBtn: document.getElementById('connectBtn'),
        };

        // --- API CALLS ---
        const api = {
            async get(url) {
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    // Handle cases where the response might not be JSON
                    const contentType = res.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        return res.json();
                    } else {
                        return res.text();
                    }
                } catch (error) {
                    console.error(`Error fetching from ${url}:`, error);
                    return null;
                }
            },
            async post(url, body) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                    });
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                     const contentType = res.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        return res.json();
                    } else {
                        return res.text();
                    }
                } catch (error) {
                    console.error(`Error posting to ${url}:`, error);
                    return null;
                }
            },
            async sendMessage(message) {
                return this.post("/send-message", { message });
            }
        };
        
        // --- UI RENDERING ---
        function renderUserList() {
            dom.userList.innerHTML = '';
            state.users.forEach(user => {
                if (user.id === state.currentUserIP) return;

                const li = document.createElement('li');
                li.className = `user-item ${user.status} ${state.currentUserId === user.id ? 'active' : ''}`;
                li.onclick = () => selectUser(user.id);
                
                const initials = user.name.substring(0, 2).toUpperCase();

                li.innerHTML = `
                    <div class="user-avatar" style="background: ${user.avatarColor}">
                        ${initials}
                        <div class="status-indicator"></div>
                    </div>
                    <div class="user-info">
                        <div class="user-name">${user.name}</div>
                        <div class="user-status-text">${user.status}</div>
                    </div>
                `;
                dom.userList.appendChild(li);
            });
        }

        function renderMessages() {
            dom.messagesContainer.innerHTML = '';
            if (!state.currentUserId || !state.messages[state.currentUserId]) {
                return;
            }

            const userMessages = state.messages[state.currentUserId].sort((a, b) => a.id - b.id);

            userMessages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.sender === state.currentUserIP ? 'sent' : 'received'}`;
                msgDiv.innerHTML = `
                    ${escapeHTML(msg.text)}
                    <div class="message-time">${msg.time}</div>
                `;
                dom.messagesContainer.appendChild(msgDiv);
            });
            scrollToBottom();
        }

        function updateChatHeader(user) {
            dom.headerName.textContent = user.name;
            dom.headerStatus.textContent = user.status;
            const initials = user.name.substring(0, 2).toUpperCase();
            dom.headerAvatar.style.background = user.avatarColor;
            dom.headerAvatar.textContent = initials;
        }

        function showChatView(show) {
            dom.chatView.style.display = show ? 'flex' : 'none';
            dom.emptyState.style.display = show ? 'none' : 'flex';
        }

        // --- LOGIC & EVENT HANDLERS ---
        async function initialize() {
            state.currentUserIP = await api.get("/userip");
            setupEventListeners();
            await pollData(); // Initial poll
            setInterval(pollData, 2000); // Poll every 2 seconds
        }

        async function pollData() {
            if (!state.isConnected) return;

            const usersData = await api.get('/get-list');
            if (usersData && usersData.peer_list) {
                const peers = usersData.peer_list;
                state.users = Object.entries(peers).map(([key, u]) => ({
                    id: key,
                    name: key,
                    status: u.active ? 'online' : 'offline',
                    avatarColor: getRandomColor(key)
                }));
                renderUserList();
            }

            const messagesData = await api.get('/api/get-messages');
            if (messagesData) {
                try {
                    const parsedMessages = typeof messagesData === 'string' ? JSON.parse(messagesData) : messagesData;
                    
                    // Simple check to see if messages have changed
                    if (JSON.stringify(state.messages) !== JSON.stringify(parsedMessages)) {
                        state.messages = parsedMessages;
                        if (state.currentUserId) {
                            renderMessages();
                        }
                    }
                } catch (e) {
                    // console.error("Could not parse messages:", e);
                }
            }
        }

        function selectUser(id) {
            if (!state.isConnected) {
                alert('Please go online to start chatting.');
                return;
            }
            state.currentUserId = id;
            const user = state.users.find(u => u.id === id);
            if (user) {
                updateChatHeader(user);
                showChatView(true);
                renderMessages();
                renderUserList(); // To update active state
                dom.messageInput.focus();
            }
        }

        async function handleSendMessage() {
            const text = dom.messageInput.value.trim();
            if (!text || !state.currentUserId) return;

            const newMsg = {
                id: Date.now(),
                text: text,
                sender: state.currentUserIP,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                receiver: state.currentUserId
            };

            // Optimistically update UI
            if (!state.messages[state.currentUserId]) {
                state.messages[state.currentUserId] = [];
            }
            state.messages[state.currentUserId].push(newMsg);
            renderMessages();
            dom.messageInput.value = '';

            // Send to backend
            await api.sendMessage(newMsg);
        }

        async function toggleConnection() {
            state.isConnected = !state.isConnected;
            const btnText = dom.connectBtn.querySelector('.btn-text');

            if (state.isConnected) {
                dom.connectBtn.classList.add('connected');
                btnText.textContent = 'Online';
                await api.post('/add-list', { 
                    ip: state.currentUserIP.split(':')[0], 
                    port: state.currentUserIP.split(':')[1],
                    active: true
                });
                pollData(); // Immediately fetch data after connecting
            } else {
                dom.connectBtn.classList.remove('connected');
                btnText.textContent = 'Go Online';
                await api.post('/remove', {
                    ip: state.currentUserIP.split(':')[0], 
                    port: state.currentUserIP.split(':')[1]
                });
                state.currentUserId = null;
                showChatView(false);
                state.users = [];
                renderUserList();
            }
        }

        function setupEventListeners() {
            dom.connectBtn.addEventListener('click', toggleConnection);
            dom.sendBtn.addEventListener('click', handleSendMessage);
            dom.messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSendMessage();
                }
            });
        }

        // --- UTILITY FUNCTIONS ---
        function scrollToBottom() {
            dom.messagesContainer.scrollTop = dom.messagesContainer.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, function(match) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[match];
            });
        }

        const colorCache = {};
        const colors = [
            'linear-gradient(135deg, #FF6B6B, #EE5253)', 'linear-gradient(135deg, #48DBFB, #0ABDE3)',
            'linear-gradient(135deg, #1DD1A1, #10AC84)', 'linear-gradient(135deg, #F368E0, #FF9FF3)',
            'linear-gradient(135deg, #FF9F43, #EE5A24)', 'linear-gradient(135deg, #54a0ff, #2e86de)',
            'linear-gradient(135deg, #5f27cd, #341f97)'
        ];

        function getRandomColor(seed) {
            if (colorCache[seed]) return colorCache[seed];
            // Simple hash function
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = seed.charCodeAt(i) + ((hash << 5) - hash);
            }
            const color = colors[Math.abs(hash) % colors.length];
            colorCache[seed] = color;
            return color;
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
