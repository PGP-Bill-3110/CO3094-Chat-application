<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">P2P Chat</h1>
                <button id="connectBtn" class="connect-btn">
                    <span class="btn-text">Go Online</span>
                    <span class="status-dot"></span>
                </button>
                <button id="joinChannelBtn" class="connect-btn" style="background-color: var(--accent-2); display: none; margin-top: 0.5rem;">
                    Join Channel
                </button>
            </div>
            
            <div class="user-list-label">Channels</div>
            <ul class="user-list" id="channelList">
                <!-- Channels will be populated by JS -->
            </ul>

            <div class="user-list-label">Direct Messages</div>
            <ul class="user-list" id="userList">
                <!-- Users will be populated by JS -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div id="chatView" style="display: none; height: 100%; flex-direction: column;">
                <header class="chat-header">
                    <div class="user-avatar" id="headerAvatar"></div>
                    <div class="chat-header-info">
                        <h2 id="headerName">User Name</h2>
                        <div class="chat-header-status" id="headerStatus">Online</div>
                    </div>
                </header>

                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will appear here -->
                </div>

                <div class="input-area">
                    <input type="text" id="messageInput" class="message-input" placeholder="Type a message...">
                    <button id="broadcastBtn" class="send-btn broadcast-btn" title="Broadcast to all online peers">
                        Broadcast
                    </button>
                    <button id="sendBtn" class="send-btn">
                        <svg viewBox="0 0 24 24">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="emptyState" class="empty-state">
                <div class="empty-state-icon">👋</div>
                <h3>Welcome to P2P Chat</h3>
                <p>Select a peer from the list to start a conversation.</p>
            </div>
        </main>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        const state = {
            // Connection & User Info
            currentUserIP: null,
            isConnected: false,
            // Users for Direct Messages
            users: [],
            messages: {},
            // Channels
            joinedChannels: [],
            channelMessages: {},
            // Active Conversation
            currentConversation: { id: null, type: null }, // type: 'user' or 'channel'
            // For notifications
            lastMessageCounts: {},
        };

        // --- DOM ELEMENTS ---
        const dom = {
            channelList: document.getElementById('channelList'),
            userList: document.getElementById('userList'),
            chatView: document.getElementById('chatView'),
            emptyState: document.getElementById('emptyState'),
            headerName: document.getElementById('headerName'),
            headerStatus: document.getElementById('headerStatus'),
            headerAvatar: document.getElementById('headerAvatar'),
            messagesContainer: document.getElementById('messagesContainer'),
            messageInput: document.getElementById('messageInput'),
            broadcastBtn: document.getElementById('broadcastBtn'),
            sendBtn: document.getElementById('sendBtn'),
            connectBtn: document.getElementById('connectBtn'),
            joinChannelBtn: document.getElementById('joinChannelBtn'),
        };

        // --- API CALLS ---
        const api = {
            async get(url) {
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    // Handle cases where the response might not be JSON
                    const contentType = res.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        return res.json();
                    } else {
                        return res.text();
                    }
                } catch (error) {
                    console.error(`Error fetching from ${url}:`, error);
                    return null;
                }
            },
            async post(url, body) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                    });
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                     const contentType = res.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        return res.json();
                    } else {
                        return res.text();
                    }
                } catch (error) {
                    console.error(`Error posting to ${url}:`, error);
                    return null;
                }
            },
            // User (DM) APIs
            sendDirectMessage(message) {
                return this.post("/send-peer/", { message });
            },
            connectPeer(peerId) {
                return this.post("/connect-peer/", { peer_id: peerId });
            },
            // Channel APIs
            getChannels() {
                return this.get('/api/channels');
            },
            sendChannelMessage(message) {
                return this.post('/send-channel-message', { message });
            },
            joinChannel(channelName) {
                return this.post('/join-channel', { channel: channelName });
            },
            async broadcastMessage(message) {
                return this.post("/broadcast-peer/", { message });
            }
        };
        
        // --- UI RENDERING ---
        function renderUserList() {
            const { id: currentId, type } = state.currentConversation;
            dom.userList.innerHTML = '';
            state.users.forEach(user => {
                if (user.id === state.currentUserIP) return;

                const li = document.createElement('li');
                li.className = `user-item ${user.status} ${type === 'user' && currentId === user.id ? 'active' : ''}`;
                li.onclick = () => selectUser(user.id);
                
                const initials = user.name.substring(0, 2).toUpperCase();

                li.innerHTML = `
                    <div class="user-avatar" style="background: ${user.avatarColor}">
                        ${initials}
                        <div class="status-indicator"></div>
                    </div>
                    <div class="user-info">
                        <div class="user-name">${user.name}</div>
                        <div class="user-status-text">${user.status}</div>
                    </div>
                `;
                dom.userList.appendChild(li);
            });
        }

        function renderChannelList() {
            const { id: currentId, type } = state.currentConversation;
            dom.channelList.innerHTML = '';
            state.joinedChannels.forEach(channelName => {
                const li = document.createElement('li');
                li.className = `channel-item ${type === 'channel' && currentId === channelName ? 'active' : ''}`;
                li.onclick = () => selectChannel(channelName);

                const messageCount = state.channelMessages[channelName]?.length || 0;
                const lastCount = state.lastMessageCounts[channelName] || 0;
                let badge = '';
                if (type !== 'channel' || currentId !== channelName) {
                    if (messageCount > lastCount) {
                        badge = `<span class="unread-badge">${messageCount - lastCount}</span>`;
                    }
                }

                li.innerHTML = `
                    <div class="channel-icon">#</div>
                    <div class="channel-name">${channelName}</div>
                    ${badge}
                `;
                dom.channelList.appendChild(li);
            });
        }

        function renderMessages() {
            dom.messagesContainer.innerHTML = '';
            const { id, type } = state.currentConversation;
            if (!id) return;

            let messages = [];
            if (type === 'user' && state.messages[id]) {
                messages = state.messages[id].sort((a, b) => a.id - b.id);
            } else if (type === 'channel' && state.channelMessages[id]) {
                messages = state.channelMessages[id].sort((a, b) => a.timestamp - b.timestamp);
            }

            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                const text = msg.text || msg.content; // Support both DM and channel message format
                const time = msg.time || new Date(msg.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                msgDiv.innerHTML = `
                    ${escapeHTML(text)}
                    <div class="message-time">${time}</div>
                `;
                dom.messagesContainer.appendChild(msgDiv);
            });
            scrollToBottom();
        }

        function updateChatHeader(user) {
            const { id, type } = state.currentConversation;
            if (type === 'channel') {
                dom.headerName.textContent = `#${id}`;
                dom.headerStatus.textContent = `${state.users.length} peers online`;
                dom.headerAvatar.style.background = 'var(--accent-2)';
                dom.headerAvatar.textContent = '#';
            } else if (type === 'user') {
                dom.headerName.textContent = user.name;
                dom.headerStatus.textContent = user.status;
                const initials = user.name.substring(0, 2).toUpperCase();
                dom.headerAvatar.style.background = user.avatarColor;
                dom.headerAvatar.textContent = initials;
            }
        }

        function showChatView(show) {
            dom.chatView.style.display = show ? 'flex' : 'none';
            dom.emptyState.style.display = show ? 'none' : 'flex';
        }

        // --- LOGIC & EVENT HANDLERS ---
        async function initialize() {
            state.currentUserIP = await api.get("/userip");
            setupEventListeners();
            await pollData(); // Initial poll
            setInterval(pollData, 2000); // Poll every 2 seconds
        }

        async function pollData() {
            if (!state.isConnected) return;

            // Poll Users
            const usersData = await api.get('/get-list');
            if (usersData && usersData.peer_list) {
                const peers = usersData.peer_list;
                state.users = Object.entries(peers).map(([key, u]) => ({
                    id: key,
                    name: key,
                    status: u.active ? 'online' : 'offline',
                    avatarColor: getRandomColor(key)
                }));
                renderUserList();
            }

            // Poll Direct Messages
            const messagesData = await api.get('/api/get-messages');
            if (messagesData) {
                try {
                    const parsedMessages = typeof messagesData === 'string' ? JSON.parse(messagesData) : messagesData;
                    if (JSON.stringify(state.messages) !== JSON.stringify(parsedMessages)) {
                        state.messages = parsedMessages;
                        if (state.currentConversation.type === 'user') renderMessages();
                    }
                } catch (e) {
                    // console.error("Could not parse messages:", e);
                }
            }

            // Poll Channels
            const channelData = await api.getChannels();
            if (channelData) {
                const hasNewChannels = JSON.stringify(state.joinedChannels.sort()) !== JSON.stringify(channelData.joined.sort());
                const hasNewMessages = JSON.stringify(state.channelMessages) !== JSON.stringify(channelData.messages);

                if (hasNewChannels) {
                    state.joinedChannels = channelData.joined;
                }
                if (hasNewMessages) {
                    state.channelMessages = channelData.messages;
                    if (state.currentConversation.type === 'channel') renderMessages();
                }
                // Always re-render channel list to update badges
                renderChannelList();
            }
        }

        async function selectUser(id) {
            if (!state.isConnected) {
                alert('Please go online to start chatting.');
                return;
            }
            state.currentConversation = { id, type: 'user' };
            await api.connectPeer(id);
            const user = state.users.find(u => u.id === id);
            if (user) {
                updateChatHeader(user);
                showChatView(true);
                renderMessages();
                renderUserList();
                renderChannelList();
                dom.messageInput.focus();
            }
        }

        function selectChannel(id) {
            if (!state.isConnected) {
                alert('Please go online to start chatting.');
                return;
            }
            state.currentConversation = { id, type: 'channel' };
            state.lastMessageCounts[id] = state.channelMessages[id]?.length || 0; // Mark as read
            updateChatHeader();
            showChatView(true);
            renderMessages();
            renderUserList();
            renderChannelList();
            dom.messageInput.focus();
        }

        async function handleSendMessage() {
            const text = dom.messageInput.value.trim();
            const { id, type } = state.currentConversation;
            if (!text || !id) return;

            if (type === 'user') {
                const newMsg = {
                    id: Date.now(),
                    text: text,
                    sender: state.currentUserIP,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    receiver: id
                };

                // Optimistically update UI
                if (!state.messages[id]) state.messages[id] = [];
                state.messages[id].push(newMsg);
                renderMessages();
                
                await api.sendDirectMessage(newMsg);

            } else if (type === 'channel') {
                const newMsg = {
                    channel: id,
                    content: text
                };
                // No optimistic update for channels, let pollData handle it to ensure consistency
                await api.sendChannelMessage(newMsg);
                await pollData(); // Force a poll to see our own message
            }

             dom.messageInput.value = '';
        }

        async function handleBroadcastMessage() {
            if (!state.isConnected) {
                alert('Please go online before broadcasting.');
                return;
            }

            const text = dom.messageInput.value.trim();
            if (!text) return;

            const broadcastMsg = {
                id: Date.now(),
                text: text,
                sender: state.currentUserIP,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                receiver: 'broadcast',
                is_broadcast: true
            };

            const result = await api.broadcastMessage(broadcastMsg);
            if (result === null) {
                alert('Broadcast failed. Please check your connection.');
                return;
            }

            dom.messageInput.value = '';
            pollData();
        }

        async function toggleConnection() {
            state.isConnected = !state.isConnected;
            const btnText = dom.connectBtn.querySelector('.btn-text');

            if (state.isConnected) {
                dom.connectBtn.classList.add('connected');
                btnText.textContent = 'Online';
                dom.joinChannelBtn.style.display = 'block';
                await api.post('/add-list', { 
                    ip: state.currentUserIP.split(':')[0], 
                    port: state.currentUserIP.split(':')[1],
                    active: true
                });
                pollData(); // Immediately fetch data after connecting
            } else {
                dom.connectBtn.classList.remove('connected');
                btnText.textContent = 'Go Online';
                dom.joinChannelBtn.style.display = 'none';
                await api.post('/remove', {
                    ip: state.currentUserIP.split(':')[0], 
                    port: state.currentUserIP.split(':')[1]
                });
                state.currentConversation = { id: null, type: null };
                showChatView(false);
                state.users = [];
                state.joinedChannels = [];
                renderUserList();
                renderChannelList();
            }
        }

        async function handleJoinChannel() {
            const channelName = prompt("Enter the name of the channel to join (e.g., 'dev-team'):");
            if (channelName && channelName.trim()) {
                const result = await api.joinChannel(channelName.trim());
                if (result) pollData(); // Refresh channel list
            }
        }

        function setupEventListeners() {
            dom.connectBtn.addEventListener('click', toggleConnection);
            dom.joinChannelBtn.addEventListener('click', handleJoinChannel);
            dom.sendBtn.addEventListener('click', handleSendMessage);
            dom.broadcastBtn.addEventListener('click', handleBroadcastMessage);
            dom.messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSendMessage();
                }
            });
        }

        // --- UTILITY FUNCTIONS ---
        function scrollToBottom() {
            dom.messagesContainer.scrollTop = dom.messagesContainer.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, function(match) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[match];
            });
        }

        const colorCache = {};
        const colors = [
            'linear-gradient(135deg, #FF6B6B, #EE5253)', 'linear-gradient(135deg, #48DBFB, #0ABDE3)',
            'linear-gradient(135deg, #1DD1A1, #10AC84)', 'linear-gradient(135deg, #F368E0, #FF9FF3)',
            'linear-gradient(135deg, #FF9F43, #EE5A24)', 'linear-gradient(135deg, #54a0ff, #2e86de)',
            'linear-gradient(135deg, #5f27cd, #341f97)'
        ];

        function getRandomColor(seed) {
            if (colorCache[seed]) return colorCache[seed];
            // Simple hash function
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = seed.charCodeAt(i) + ((hash << 5) - hash);
            }
            const color = colors[Math.abs(hash) % colors.length];
            colorCache[seed] = color;
            return color;
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
